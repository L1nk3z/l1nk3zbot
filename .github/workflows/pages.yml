name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp web/index.html _site/index.html
          if [ -d "zerno" ]; then cp -R zerno _site/zerno; fi
          if [ -d "helpzerno" ]; then cp -R helpzerno _site/helpzerno; fi
          if [ -f "qr.jpg" ]; then cp qr.jpg _site/qr.jpg; fi
          if [ -f "web_users.json" ]; then cp web_users.json _site/web_users.json; fi
          if [ -f ".nojekyll" ]; then cp .nojekyll _site/.nojekyll; else touch _site/.nojekyll; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
